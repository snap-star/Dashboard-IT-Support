name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  contents: read

jobs:
  pr-title-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Validate PR title
        uses: amannn/action-semantic-pull-request@v5
        with:
          types: |
            fix
            feat
            docs
            style
            refactor
            perf
            test
            chore
            ci
            revert
          requireScope: false
          subjectPattern: ^(?!.*\.$).+$
          subjectPatternError: |
            The subject "{subject}" found in the pull request title "{title}"
            is invalid. It must not end with a period.
          wip: true
          validateSingleCommit: false
