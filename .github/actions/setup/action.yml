name: Setup Node.js and pnpm
description: Checkout, setup pnpm/Node, install dependencies

runs:
  using: composite
  steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      # Removed 'version' — reads from packageManager field in package.json
      with:
        run_install: false
        
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24
        cache: 'pnpm'
        
    - name: Cache
      uses: actions/cache@v5.0.5
      
    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile
